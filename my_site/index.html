<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daptunstudio — LIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #06060e; color: #fff; overflow-x: hidden; min-height: 100vh; }

        .live-badge { animation: livePulse 2s ease-in-out infinite; }
        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5), 0 0 12px rgba(239,68,68,0.2); }
            50% { box-shadow: 0 0 0 6px rgba(239,68,68,0), 0 0 20px rgba(239,68,68,0.1); }
        }
        .live-dot-blink { animation: blink 1.2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

        /* YT Stealth Mode: Zoom and Crop to hide original YouTube UI labels */
        #yt-player-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 115%; /* Crop edges */
            height: 115%; /* Crop edges */
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none !important;
        }
        #yt-player { width: 100%; height: 100%; }

        /* OSD elements hide except logo */
        .osd-fade { transition: opacity 0.4s ease, transform 0.4s ease; }
        .osd-hidden .osd-fade { opacity: 0 !important; pointer-events: none !important; }
        .osd-hidden .osd-bottom { transform: translateY(10px); }
        .osd-hidden .osd-top { transform: translateY(-10px); }

        /* Permanent Logo - Always visible */
        .logo-permanent { opacity: 0.35; z-index: 100; pointer-events: none; }

        /* Cursor Hide */
        #player-wrapper.cursor-none { cursor: none !important; }

        /* Fullscreen button */
        .fs-btn {
            pointer-events: auto; cursor: pointer; z-index: 40;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            padding: 6px 10px; color: rgba(255,255,255,0.5);
            transition: all 0.2s ease; display: flex; align-items: center; gap: 5px;
            font-size: 11px; font-weight: 600;
        }
        .fs-btn:hover { background: rgba(124,58,237,0.4); border-color: rgba(124,58,237,0.5); color: #fff; }
        .fs-btn svg { width: 16px; height: 16px; }

        /* Fullscreen mode */
        #player-wrapper:fullscreen, #player-wrapper:-webkit-full-screen {
            border-radius: 0; border: none; width: 100vw; height: 100vh; max-width: none;
        }
        #player-wrapper:fullscreen .fs-icon-open { display: none; }
        #player-wrapper:fullscreen .fs-icon-close { display: block; }
        #player-wrapper:not(:fullscreen) .fs-icon-close { display: none; }

        .progress-glow { box-shadow: 0 0 6px rgba(124,58,237,0.4); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 3px; }
    </style>
</head>
<body>

    <header class="relative z-10 border-b border-white/10 bg-black/60 backdrop-blur-xl sticky top-0">
        <div class="max-w-[1000px] mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-600 via-pink-500 to-indigo-600 flex items-center justify-center font-black text-lg shadow-lg shadow-purple-600/30" style="font-family:'Orbitron'">D</div>
                <div>
                    <h1 class="font-bold text-lg tracking-widest" style="font-family:'Orbitron'">daptunstudio</h1>
                    <p class="text-[10px] text-gray-500 tracking-wider uppercase">Онлайн телеканал</p>
                </div>
            </div>
            <div id="clock" class="text-sm text-gray-400 font-mono tracking-wider"></div>
        </div>
    </header>

    <main class="relative z-10 max-w-[1000px] mx-auto px-4 py-6">
        <div class="mb-4">
            <div id="player-wrapper" class="relative aspect-video rounded-2xl overflow-hidden border border-white/10 shadow-2xl shadow-purple-900/30 bg-black">

                <div id="yt-player-container">
                    <div id="yt-player"></div>
                </div>

                <div id="osd-layer" class="absolute inset-0 z-30 pointer-events-none">
                    <!-- Permanent Logo -->
                    <div class="logo-permanent absolute top-3 left-16 text-[9px] font-bold tracking-[2px] text-white uppercase" style="font-family:'Orbitron'">
                        daptunstudio
                    </div>

                    <!-- LIVE badge -->
                    <div class="osd-fade osd-top absolute top-3 left-3">
                        <div class="live-badge flex items-center gap-1.5 bg-red-600/90 rounded-md px-2 py-1 shadow-lg shadow-red-600/30">
                            <span class="w-1.5 h-1.5 bg-white rounded-full live-dot-blink inline-block"></span>
                            <span class="font-black text-[10px] tracking-[0.15em]">LIVE</span>
                        </div>
                    </div>

                    <!-- Fullscreen button -->
                    <button id="fs-btn" class="osd-fade osd-top fs-btn absolute top-3 right-3 pointer-events-auto" onclick="toggleFullscreen()" title="Полный экран">
                        <svg class="fs-icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <polyline points="9 21 3 21 3 15"></polyline>
                            <line x1="21" y1="3" x2="14" y2="10"></line>
                            <line x1="3" y1="21" x2="10" y2="14"></line>
                        </svg>
                        <svg class="fs-icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="4 14 10 14 10 20"></polyline>
                            <polyline points="20 10 14 10 14 4"></polyline>
                            <line x1="14" y1="10" x2="21" y2="3"></line>
                            <line x1="3" y1="21" x2="10" y2="14"></line>
                        </svg>
                    </button>

                    <!-- Bottom bar -->
                    <div class="osd-fade osd-bottom absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/85 via-black/40 to-transparent pt-16 pb-3 px-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <div class="flex items-center gap-2">
                                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 inline-block"></span>
                                    <span class="text-white/50 text-[10px] font-semibold uppercase tracking-wider">Сейчас в эфире</span>
                                </div>
                                <span id="now-title" class="font-bold text-base tracking-wide">СашаТаня</span>
                                <div class="flex items-center gap-3 mt-0.5">
                                    <span id="now-episode" class="text-xs text-gray-400"></span>
                                    <span class="text-gray-700">•</span>
                                    <span id="now-time" class="text-xs text-gray-500 font-mono"></span>
                                </div>
                            </div>
                            <div class="text-right">
                                <span id="now-remaining" class="text-xs text-gray-500 font-mono"></span>
                            </div>
                        </div>
                        <div class="mt-2 h-[3px] bg-white/10 rounded-full overflow-hidden w-full">
                            <div id="episode-progress" class="h-full bg-gradient-to-r from-purple-500 via-pink-500 to-indigo-500 rounded-full progress-glow transition-all duration-500" style="width:0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white/[0.03] border border-white/10 rounded-xl p-4 backdrop-blur-sm">
            <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-3">📺 Программа передач</h3>
            <div id="schedule-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 text-sm"></div>
        </div>
    </main>

    <script>
        var tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.body.appendChild(tag);
    </script>

    <script>
    const VIDEOS = [
        { id: 'bmiQK2ocBfA', duration: 3913, label: 'Сезон 1 • Серии 1-3' },
        { id: 'GBupo9i8-nE', duration: 4050, label: 'Сезон 1 • Серии 4-6' },
        { id: 'RP91zwpfrCE', duration: 3950, label: 'Сезон 1 • Серии 7-9' },
        { id: 'JGnJlOQuJ7k', duration: 3980, label: 'Сезон 1 • Серии 10-12' },
        { id: '_XX65FVoHrw', duration: 4020, label: 'Сезон 1 • Серии 13-15' },
        { id: 'ZZb_uGAFyfg', duration: 3950, label: 'Сезон 1 • Серии 16-18' },
        { id: 'fGOpv_itajI', duration: 3890, label: 'Сезон 1 • Серии 23-25' },
    ];

    const CONFIG = {
        epoch: new Date('2024-01-01T00:00:00Z').getTime(),
        syncTolerance: 3,
        hideDelay: 5000,
    };

    const TOTAL_CYCLE_MS = VIDEOS.reduce((s, v) => s + v.duration * 1000, 0);

    let state = { player: null, ready: false, currentIdx: -1, hideTimer: null };

    function getSync() {
        const elapsed = (Date.now() - CONFIG.epoch) % TOTAL_CYCLE_MS;
        let cum = 0;
        for (let i = 0; i < VIDEOS.length; i++) {
            const vdMs = VIDEOS[i].duration * 1000;
            if (elapsed < cum + vdMs) {
                const s = elapsed - cum;
                return { i, sec: s/1000, v: VIDEOS[i], p: s/vdMs, eMs: s, rMs: vdMs-s };
            }
            cum += vdMs;
        }
        return { i: 0, sec: 0, v: VIDEOS[0], p: 0, eMs: 0, rMs: VIDEOS[0].duration*1000 };
    }

    function onYouTubeIframeAPIReady() {
        state.player = new YT.Player('yt-player', {
            width: '100%', height: '100%',
            playerVars: { 
                autoplay: 1, 
                controls: 0, 
                disablekb: 1, 
                modestbranding: 1, 
                playsinline: 1, 
                vq: 'hd1080', 
                rel: 0,
                iv_load_policy: 3,
                mute: 1 // Обязательно для автостарта в браузерах
            },
            events: {
                onReady: () => { 
                    state.ready = true; 
                    sync(); 
                    // Гарантируем запуск
                    setTimeout(() => { state.player.playVideo(); }, 1000);
                },
                onStateChange: (e) => { 
                    if (e.data === YT.PlayerState.PAUSED) state.player.playVideo();
                    if (e.data === YT.PlayerState.ENDED) sync(); 
                }
            }
        });
    }

    // Включаем звук при первом взаимодействии с сайтом
    window.addEventListener('click', () => {
        if (state.player && state.player.unMute) {
            state.player.unMute();
            state.player.setVolume(100);
        }
    }, { once: true });

    function sync() {
        if (!state.ready) return;
        const s = getSync();
        if (state.currentIdx !== s.i) {
            state.currentIdx = s.i;
            state.player.loadVideoById({ videoId: s.v.id, startSeconds: s.sec, suggestedQuality: 'hd1080' });
        } else {
            const cur = state.player.getCurrentTime();
            if (Math.abs(cur - s.sec) > CONFIG.syncTolerance) state.player.seekTo(s.sec, true);
        }
    }

    function toggleFullscreen() {
        const w = document.getElementById('player-wrapper');
        if (!document.fullscreenElement) w.requestFullscreen();
        else document.exitFullscreen();
    }

    function showOSD() {
        document.getElementById('osd-layer').classList.remove('osd-hidden');
        document.getElementById('player-wrapper').classList.remove('cursor-none');
        clearTimeout(state.hideTimer);
        state.hideTimer = setTimeout(() => {
            document.getElementById('osd-layer').classList.add('osd-hidden');
            document.getElementById('player-wrapper').classList.add('cursor-none');
        }, CONFIG.hideDelay);
    }

    function init() {
        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('ru-RU');
            const s = getSync();
            document.getElementById('episode-progress').style.width = (s.p*100)+'%';
            document.getElementById('now-episode').textContent = s.v.label;
            document.getElementById('now-time').textContent = `${Math.floor(s.eMs/60000)}:${String(Math.floor((s.eMs%60000)/1000)).padStart(2,'0')}`;
            document.getElementById('now-remaining').textContent = `Осталось ${Math.floor(s.rMs/60000)}:${String(Math.floor((s.rMs%60000)/1000)).padStart(2,'0')}`;
        }, 1000);
        setInterval(sync, 10000);
        document.getElementById('player-wrapper').addEventListener('mousemove', showOSD);
        showOSD();
    }
    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
